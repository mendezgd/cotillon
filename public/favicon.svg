<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Balloon body gradient: warm pink to magenta -->
    <radialGradient id="balloon" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="55%"  stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </radialGradient>
    <!-- Subtle shadow beneath balloon -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#db2777" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Balloon body -->
  <ellipse cx="32" cy="26" rx="20" ry="22" fill="url(#balloon)" filter="url(#shadow)"/>

  <!-- Specular highlight (3-D feel) -->
  <ellipse cx="26" cy="18" rx="6" ry="4.5"
           fill="white" opacity="0.38"
           transform="rotate(-25 26 18)"/>

  <!-- Balloon knot (small oval at the bottom tip) -->
  <ellipse cx="32" cy="48.5" rx="3" ry="2" fill="#be185d"/>

  <!-- String (gentle S-curve down) -->
  <path d="M32 50.5 Q27 56 31 61"
        stroke="#9ca3af" stroke-width="1.5" fill="none"
        stroke-linecap="round"/>

  <!-- Tiny star sparkle, top-right -->
  <g transform="translate(50,12) scale(0.9)">
    <path d="M0-5 L1.2-1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2-1.2 Z"
          fill="#fcd34d"/>
  </g>
</svg>
